<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>threshold</title>

  <!-- IMPORTANT: keep these filenames exactly as shown -->
  <link rel="stylesheet" href="style.css?v=12" />
</head>
<body>

  <!-- Language Landing Screen -->
  <div id="lang-screen" aria-label="Language selection">
    <div class="lang-card">
      <div class="lang-title">Choose language</div>
      <div class="lang-subtitle">Elige idioma</div>

      <div class="lang-buttons">
        <button id="choose-en" class="lang-btn" type="button">English</button>
        <button id="choose-es" class="lang-btn" type="button">Español</button>
      </div>

      <div class="lang-footnote">You can switch later.</div>
    </div>
  </div>

  <!-- Intro (staged by JS) -->
  <div id="intro" style="display:none;">
    <div id="intro-title">threshold</div>
    <div id="intro-subtitle">a question is a doorway</div>
  </div>

  <!-- Main UI -->
  <div id="ui" style="display:none;">

    <!-- Small language toggle -->
    <button id="language-toggle" type="button" aria-label="Toggle language">EN | ES</button>

    <!-- Top row: categories + info -->
    <div id="top-row" aria-label="Navigation">
      <div id="cats" aria-label="Categories">

        <button class="cat" data-field="self" type="button" aria-label="Self">
          <span class="ico">○</span>
          <span class="name" data-en="Self" data-es="Yo">Self</span>
        </button>

        <button class="cat" data-field="relationship" type="button" aria-label="Relationship">
          <span class="ico">∞</span>
          <span class="name" data-en="Relationship" data-es="Vínculo">Relationship</span>
        </button>

        <button class="cat" data-field="body" type="button" aria-label="Body">
          <span class="ico">△</span>
          <span class="name" data-en="Body" data-es="Cuerpo">Body</span>
        </button>

        <button class="cat" data-field="shadow" type="button" aria-label="Shadow">
          <span class="ico">◑</span>
          <span class="name" data-en="Shadow" data-es="Sombra">Shadow</span>
        </button>

        <button class="cat" data-field="time" type="button" aria-label="Time">
          <span class="ico">⌛</span>
          <span class="name" data-en="Time" data-es="Tiempo">Time</span>
        </button>

        <button class="cat" data-field="silence" type="button" aria-label="Silence">
          <span class="ico">—</span>
          <span class="name" data-en="Silence" data-es="Silencio">Silence</span>
        </button>

      </div>

      <button id="info-btn" type="button" aria-label="About">i</button>
    </div>

    <!-- Question -->
    <div id="question-container" aria-live="polite">
      <div id="question" class="q-in"></div>
    </div>

    <!-- Threshold (Next) -->
    <button id="next" class="threshold-btn" type="button" aria-label="Next question">
      <span class="threshold-visual" aria-hidden="true">
        <span class="mirror"></span>
        <span class="caustics"></span>
        <span class="sheen"></span>

        <span class="rim"></span>
        <span class="rim rim2"></span>

        <span class="gate"></span>
        <span class="spark"></span>

        <!-- Ripple rings (triggered on tap) -->
        <span class="ripple r1"></span>
        <span class="ripple r2"></span>
        <span class="ripple r3"></span>
      </span>

      <span class="next-hint" id="next-hint">cross the threshold</span>
    </button>

  </div>

  <!-- Info Modal -->
  <div id="info-modal" class="hidden" role="dialog" aria-modal="true" aria-label="About">
    <div id="info-card">
      <button id="info-close" aria-label="Close" type="button">×</button>

      <div class="info-title" id="info-title">threshold</div>

      <div class="info-block">
        <div class="info-label" id="info-label-1">Threshold</div>
        <div class="info-text" id="info-text-1">
          The space between who you were and who you are becoming.
        </div>
      </div>

      <div class="info-block">
        <div class="info-label" id="info-label-2">Umbral</div>
        <div class="info-text" id="info-text-2">
          El límite entre lo conocido y lo que empieza a revelarse.
        </div>
      </div>
    </div>
  </div>

  <!-- IMPORTANT: these must exist in your repo root -->
  <script src="questions.js?v=12"></script>
  <script src="engine.js?v=12"></script>
</body>
</html>
